# fly.toml -- shi-dashboard (Next.js 15 + Postgres)
# Region: sin (Singapore). Region match dengan Fly Postgres untuk latensi rendah.

app             = "shi-dashboard"
primary_region  = "sin"

[build]
  dockerfile = "Dockerfile"

# Auto-migrate + auto-seed pada tiap deploy. Fly menjalankan release_command
# di ephemeral machine sebelum release naik. Schema.sql idempotent
# (CREATE IF NOT EXISTS). Seed.sql diskip otomatis kalau tabel users sudah
# punya data (lihat database/setup.ts). Untuk re-seed paksa: SSH ke machine
# dan jalankan `bun database/setup.ts --force-seed`.
[deploy]
  release_command = "bun database/setup.ts --seed"

[env]
  PORT                    = "3000"
  NODE_ENV                = "production"
  NEXT_TELEMETRY_DISABLED = "1"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes           = ["app"]

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"

[mounts]
  source      = "shi_data"
  destination = "/data"
