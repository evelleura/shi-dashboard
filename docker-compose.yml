services:
  db:
    # Postgres polos. Skema TIDAK di-bake di sini — run.py memuat skema app dir
    # aktif (frontend_backup/database/schema.sql atau frontend/database/init.sql)
    # setelah DB siap, supaya satu DB bisa melayani kedua app dir.
    image: postgres:17-alpine
    container_name: shi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shi
      # Samakan zona waktu DB dengan aplikasi (WIB) supaya NOW()/CURRENT_DATE
      # cocok dengan "hari ini" yang dihitung browser -> laporan harian tidak
      # meleset 1 hari karena beda UTC vs WIB.
      TZ: Asia/Jakarta
      PGTZ: Asia/Jakarta
    ports:
      - "5433:5432"
    volumes:
      - shi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shi"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Container produksi Next.js. Hanya dijalankan bila profil 'app' aktif:
  #   docker compose --profile app up -d
  # Tujuannya supaya `docker compose up` standar hanya menjalankan DB,
  # dan TIDAK bentrok dengan `bun run dev` yang juga memakai port 3000
  # serta menulis ke .next pada folder kerja host.
  app:
    profiles: ["app"]
    build:
      # Diarahkan run.py via APP_CONTEXT (./frontend_backup default, ./frontend saat --new).
      context: ${APP_CONTEXT:-./frontend_backup}
      dockerfile: Dockerfile
    container_name: shi_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: shi
      JWT_SECRET: ganti-secret-ini-saat-produksi
      NODE_ENV: production
    ports:
      - "3000:3000"
    # PENTING: TIDAK bind-mount ./frontend agar .next host tidak
    # menimpa hasil build di dalam image.
    volumes:
      - shi_uploads:/app/uploads

volumes:
  shi_pgdata:
  shi_uploads:
