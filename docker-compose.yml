services:
  postgres:
    image: postgres:17-alpine
    container_name: shi-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: shi_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - shi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  shi_pgdata:
